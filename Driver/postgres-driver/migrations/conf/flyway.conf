# Flyway Configuration for PostgreSQL
# Place this file in the migrations directory
# Environment variables can override defaults (FLYWAY_HOST, FLYWAY_PORT, FLYWAY_DATABASE, FLYWAY_USER, FLYWAY_PASSWORD)

flyway.url=jdbc:postgresql://${FLYWAY_HOST:localhost}:${FLYWAY_PORT:5432}/${FLYWAY_DATABASE:media}
flyway.user=${FLYWAY_USER:user}
flyway.password=${FLYWAY_PASSWORD:password}
flyway.schemas=users,kafka_sink
flyway.locations=filesystem:/flyway/migrations
flyway.baseline-on-migrate=true
flyway.outOfOrder=false
flyway.validateOnMigrate=true
flyway.sqlMigrationPrefix=V
flyway.undoSqlMigrationPrefix=U
flyway.repeatableSqlMigrationPrefix=R
